    <title>ProDG 360° Review — Team Performance Intelligence</title>
    <meta name="description" content="ProDG's 360° Review platform — peer performance intelligence, feedback analytics, and team insights for developer communities." />

    <!-- Canonical + social: __PRODG_SITE_URL__ replaced at build time (see vite.config.ts). Set VITE_SITE_URL for your production domain. -->
    <link rel="canonical" href="__PRODG_SITE_URL__/" />

    <!-- Open Graph (absolute image URL required for Facebook, LinkedIn, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__PRODG_SITE_URL__/" />
    <meta property="og:site_name" content="ProDG 360° Review" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="ProDG 360° Review — Team Performance Intelligence" />
    <meta property="og:description" content="ProDG's 360° Review platform — peer performance intelligence, feedback analytics, and team insights for developer communities." />
    <!-- PNG: reliable for WhatsApp/Facebook crawlers; absolute HTTPS URL required -->
    <meta property="og:image" content="__PRODG_SITE_URL__/og-image.png?v=20260420" />
    <meta property="og:image:secure_url" content="__PRODG_SITE_URL__/og-image.png?v=20260420" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ProDG 360° Review — peer performance intelligence" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ProDG 360° Review — Team Performance Intelligence" />
    <meta name="twitter:description" content="ProDG's 360° Review platform — peer performance intelligence, feedback analytics, and team insights for developer communities." />
    <meta name="twitter:image" content="__PRODG_SITE_URL__/og-image.png?v=20260420" />
